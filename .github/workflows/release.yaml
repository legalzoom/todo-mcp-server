name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build MCPB bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            m.version = '${VERSION}';
            require('fs').writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          npm prune --omit=dev
          npx --yes @anthropic-ai/mcpb pack . ${{ github.event.repository.name }}.mcpb
          npx --yes @anthropic-ai/mcpb sign ${{ github.event.repository.name }}.mcpb --self-signed

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            org.opencontainers.image.title=Todo MCP Server
            org.opencontainers.image.description=A demo MCP server showcasing best practices and full MCP spec functionality
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            io.modelcontextprotocol.server.name=io.github.${{ github.repository_owner }}/${{ github.event.repository.name }}

      - uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" ${{ github.event.repository.name }}.mcpb --generate-notes
