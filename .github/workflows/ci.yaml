name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Verify version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SRV_VERSION=$(node -p "require('./server.json').version")
          echo "package.json=$PKG_VERSION server.json=$SRV_VERSION"
          [[ "$PKG_VERSION" == "$SRV_VERSION" ]] || {
            echo "::error::Version mismatch — package.json ($PKG_VERSION) and server.json ($SRV_VERSION) must match"
            exit 1
          }
